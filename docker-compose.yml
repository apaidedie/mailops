services:
  mailops:
    image: ghcr.io/apaidedie/mailops:latest
    container_name: mailops
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
    environment:
      # 必填：随机密钥（生成：python -c "import secrets; print(secrets.token_hex(32))"）
      SECRET_KEY: "change-me-to-a-random-secret"
      LOGIN_PASSWORD: "admin123"
