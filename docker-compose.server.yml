# MailOps — server one-click deploy (pull prebuilt image, no local build)
#
#   curl -fsSL https://raw.githubusercontent.com/apaidedie/mailops/main/docker-compose.server.yml -o docker-compose.yml
#   # or: git clone … && cd mailops
#   cp .env.example .env   # set SECRET_KEY
#   docker compose -f docker-compose.server.yml up -d
#
# Image: ghcr.io/apaidedie/mailops:latest
# (make the GHCR package public if the server is not logged in)

services:
  app:
    image: ghcr.io/apaidedie/mailops:${IMAGE_TAG:-latest}
    container_name: mailops
    ports:
      - "${APP_PORT:-5001}:5000"
    env_file:
      - .env
    environment:
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-1}"
      GUNICORN_THREADS: "${GUNICORN_THREADS:-8}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
      TEMP_MAIL_PROVIDER: "${TEMP_MAIL_PROVIDER:-}"
      EXTERNAL_POOL_DEFAULT_PROVIDER: "${EXTERNAL_POOL_DEFAULT_PROVIDER:-}"
      ACTIVE_MAILBOX_PROVIDERS: "${ACTIVE_MAILBOX_PROVIDERS:-}"
    volumes:
      - ./data:/app/data
      - ./.runtime:/app/.runtime
      - ./plugins:/app/plugins
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
