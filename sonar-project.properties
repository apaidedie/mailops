# Optional SonarCloud identity for this fork/repo.
# Analysis only runs when GitHub secret SONAR_TOKEN is set (.github/workflows/sonar.yml skips otherwise).
sonar.projectKey=apaidedie_mailops
sonar.organization=apaidedie
sonar.projectName=mailops

sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

# Keep HTML templates in scope; excluding templates would disable HTML analysis.
sonar.sources=mailops,templates,web_mailops_app.py,outlook_mail_reader.py,start.py
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Limit analysis to primary Python and HTML sources.
sonar.inclusions=mailops/**/*.py,templates/**/*.html,web_mailops_app.py,outlook_mail_reader.py,start.py,tests/**/*.py

# Exclude environments, caches, generated artifacts, vendored/example repositories, docs and assets.
sonar.exclusions=.git/**,.venv/**,venv/**,__pycache__/**,**/__pycache__/**,.pytest_cache/**,.qoder/**,.kiro/**,static/**,migrations/**,docs/**,img/**,dist/**,data/**,exeample/**,tests/layout-system/coverage/**,**/*.min.js

# Exclude non-production and generated files from duplication and coverage calculations.
sonar.cpd.exclusions=docs/**,img/**,dist/**,exeample/**,tests/**,tests/layout-system/coverage/**
sonar.coverage.exclusions=tests/**,templates/**,static/**,docs/**,img/**,dist/**,data/**,exeample/**,web_mailops_app.py,start.py,outlook_mail_reader.py
sonar.python.coverage.reportPaths=coverage.xml
