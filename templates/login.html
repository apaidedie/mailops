<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MailOps</title>
    <link rel="icon" type="image/png" href="/img/ico.png">
    <link rel="stylesheet" href="/static/css/core/tokens.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/core/ui-modern.css?v=ui241">
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"/>
                        <path d="m5 8 6.15 4.25a1.5 1.5 0 0 0 1.7 0L19 8"/>
                    </svg>
                </div>
                <h1>MailOps</h1>
                <p>统一邮箱工作台 · 安全登录</p>
            </div>

            <div id="errorMessage" class="form-error" style="display:none;" role="alert"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="password">登录密码</label>
                    <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" autofocus required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">登 录</button>
            </form>

            <p class="auth-foot">
                MailOps · 注册与验证场景邮箱运维
            </p>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const pickApiMessage = window.pickApiMessage || ((payload, zh) => zh);
            const translateText = window.translateAppText || ((text) => text);

            if (!password) {
                errorMessage.textContent = translateText('请输入密码');
                errorMessage.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = translateText('登录中...');
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    const msg = (data.error && typeof data.error === 'object')
                        ? pickApiMessage(data.error, '登录失败', 'Login failed')
                        : translateText(data.error || '登录失败');
                    errorMessage.textContent = msg;
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = translateText('登 录');
                }
            } catch (error) {
                errorMessage.textContent = translateText('网络错误，请重试');
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = translateText('登 录');
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
