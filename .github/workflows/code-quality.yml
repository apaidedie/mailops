name: Code Quality

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "**.py"
      - ".env.example"
      - ".runtime/providers.example.json"
      - ".runtime/providers.example.toml"
      - "docs/external-integration-quickstart.md"
      - "docs/provider-onboarding.md"
      - "docs/runtime-readiness.md"
      - "docs/project-launchpad.md"
      - "examples/external_api_python_client.py"
      - "examples/external_api_javascript_client.js"
      - "examples/temp_mail_provider_plugin_template.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "scripts/external_api_smoke.py"
      - "scripts/project_readiness_check.py"
      - "tests/test_ci_readiness_gate_workflows.py"
      - "tests/test_dependency_security_automation.py"
      - "tests/test_project_readiness_check.py"
      - ".github/dependabot.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/code-quality.yml"
      - ".github/workflows/dependency-security.yml"
      - ".github/workflows/docker-build-push.yml"
      - "RELEASE.md"
  pull_request:
    paths:
      - "**.py"
      - ".env.example"
      - ".runtime/providers.example.json"
      - ".runtime/providers.example.toml"
      - "docs/external-integration-quickstart.md"
      - "docs/provider-onboarding.md"
      - "docs/runtime-readiness.md"
      - "docs/project-launchpad.md"
      - "examples/external_api_python_client.py"
      - "examples/external_api_javascript_client.js"
      - "examples/temp_mail_provider_plugin_template.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "scripts/external_api_smoke.py"
      - "scripts/project_readiness_check.py"
      - "tests/test_ci_readiness_gate_workflows.py"
      - "tests/test_dependency_security_automation.py"
      - "tests/test_project_readiness_check.py"
      - ".github/dependabot.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/code-quality.yml"
      - ".github/workflows/dependency-security.yml"
      - ".github/workflows/docker-build-push.yml"
      - "RELEASE.md"
  workflow_dispatch:

jobs:
  repository-readiness:
    name: Repository Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run local integration readiness gate
        run: python scripts/project_readiness_check.py

      - name: Run readiness workflow wiring tests
        run: python -m unittest tests.test_ci_readiness_gate_workflows tests.test_project_readiness_check -v

  linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy

      - name: Run Black (Code Formatter Check)
        run: black --check --diff mailops tests web_outlook_app.py outlook_mail_reader.py start.py

      - name: Run isort (Import Sorting Check)
        run: isort --check-only --diff --profile black mailops tests web_outlook_app.py outlook_mail_reader.py start.py

      - name: Run Flake8 (Linting)
        run: flake8 mailops tests web_outlook_app.py outlook_mail_reader.py start.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Flake8 (Complexity Check)
        run: >
          flake8
          mailops/repositories/settings.py
          mailops/controllers/emails/external_api.py
          mailops/routes/system.py
          web_outlook_app.py
          --count
          --select=C901
          --max-complexity=15
          --statistics

      - name: Run mypy (Core Modules)
        run: >
          mypy
          --config-file pyproject.toml
          mailops/repositories/settings.py
          mailops/controllers/emails/external_api.py
          mailops/routes/system.py
          web_outlook_app.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit[toml]

      - name: Run Bandit Security Scan
        shell: bash
        run: |
          set +e
          bandit -r mailops web_outlook_app.py outlook_mail_reader.py start.py -f sarif -o bandit-report.sarif
          report_status=$?
          bandit -r mailops web_outlook_app.py outlook_mail_reader.py start.py -lll
          gate_status=$?
          echo "bandit_report_exit_code=$report_status" >> "$GITHUB_ENV"
          echo "bandit_gate_exit_code=$gate_status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload Bandit SARIF
        if: always() && hashFiles('bandit-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.sarif

      - name: Fail on Bandit Findings
        if: always()
        shell: bash
        run: |
          status="${bandit_gate_exit_code:-1}"
          if [ "$status" -ne 0 ]; then
            echo "Bandit found high-severity issues, exit code=$status"
            exit "$status"
          fi
