name: Dependency Security

on:
  push:
    branches: ["main", "master"]
    paths:
      - "requirements.txt"
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-security.yml"
      - ".github/workflows/docker-build-push.yml"
  pull_request:
    paths:
      - "requirements.txt"
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-security.yml"
      - ".github/workflows/docker-build-push.yml"
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-dependency-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.1

      - name: Audit Python dependencies
        id: audit
        shell: bash
        run: |
          set +e
          pip-audit -r requirements.txt \
            --progress-spinner off \
            --format json \
            --output pip-audit-report.json
          audit_status=$?
          echo "exit_code=$audit_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Fail on known vulnerabilities or audit errors
        if: always()
        shell: bash
        run: |
          status="${{ steps.audit.outputs.exit_code }}"
          if [ -z "$status" ]; then
            echo "pip-audit did not publish an exit code"
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "pip-audit failed or found known vulnerabilities, exit code=$status"
            exit "$status"
          fi
