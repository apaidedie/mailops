name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
      - master
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "Dockerfile"
      - "templates/**"
      - "static/**"
      - "scripts/**"
      - "docker-compose*.yml"
      - ".github/workflows/docker-build-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Repository readiness gate
        run: python scripts/project_readiness_check.py

      - name: Focused contract tests
        run: |
          python -m unittest \
            tests.test_module_boundaries \
            tests.test_smoke_contract \
            tests.test_healthcheck_script \
            tests.test_external_api_versioned_aliases \
            -v

  build-and-push:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image names
        id: names
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr_image=ghcr.io/${OWNER}/mailops" >> "$GITHUB_OUTPUT"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
            echo "images=ghcr.io/${OWNER}/mailops,${{ secrets.DOCKERHUB_USERNAME }}/mailops" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
            echo "images=ghcr.io/${OWNER}/mailops" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        if: steps.names.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.names.outputs.images }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: |
          echo "digest=${{ steps.build.outputs.digest }}"
          echo "Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}"
