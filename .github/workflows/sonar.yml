name: SonarCloud Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Analysis is best-effort: missing/invalid Sonar secrets must not block publish CI.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require Sonar token
        id: sonar_auth
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not configured; skipping SonarCloud scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.sonar_auth.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.sonar_auth.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Run tests with coverage
        if: steps.sonar_auth.outputs.skip != 'true'
        run: |
          coverage run -m unittest discover -s tests -v
          coverage xml

      - name: SonarCloud Scan
        if: steps.sonar_auth.outputs.skip != 'true'
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarCloud SaaS host must include scheme. Do not pass a bare path from secrets.
          SONAR_HOST_URL: https://sonarcloud.io
