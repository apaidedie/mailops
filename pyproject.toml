[tool.black]
line-length = 127

[tool.isort]
profile = "black"
line_length = 127

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
follow_imports = "skip"

[tool.coverage.run]
omit = [
    "*/mailops-tests-*/plugins/temp_mail_providers/*.py",
    "*/mailops-tests-*/plugins/temp_mail_providers/test_plugin/*.py",
    # Ephemeral modules generated by provider-dev-kit / scaffold tests.
    "*/provider-dev-kit-*/*",
]

[tool.coverage.report]
ignore_errors = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
